<svg width="800" height="220" viewBox="0 0 800 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="attar, web developer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#3730a3"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <rect width="800" height="220" rx="16" fill="url(#bg)"/>
  <circle cx="700" cy="40" r="110" fill="#818cf8" opacity="0.18" filter="url(#glow)"/>

  <path d="M0,16 Q0,0 16,0 L784,0 Q800,0 800,16 L800,40 L0,40 Z" fill="#211d52"/>
  <circle cx="24" cy="20" r="6" fill="#ef4444"/>
  <circle cx="44" cy="20" r="6" fill="#f59e0b"/>
  <circle cx="64" cy="20" r="6" fill="#22c55e"/>
  <text x="90" y="25" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="13" fill="#8b86c4">whoami.js</text>

  <g font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="16">
    <text x="40" y="80"><tspan fill="#a5b4fc">const</tspan><tspan fill="#e0e7ff"> attar </tspan><tspan fill="#94a3b8">= </tspan><tspan fill="#e0e7ff">{</tspan></text>

    <text x="64" y="110"><tspan fill="#93c5fd">role</tspan><tspan fill="#94a3b8">: </tspan><tspan fill="#86efac">"web developer"</tspan><tspan fill="#94a3b8">,</tspan></text>

    <text x="64" y="140"><tspan fill="#93c5fd">stack</tspan><tspan fill="#94a3b8">: </tspan><tspan fill="#e0e7ff">[</tspan><tspan fill="#86efac">"react"</tspan><tspan fill="#94a3b8">, </tspan><tspan fill="#86efac">"next.js"</tspan><tspan fill="#94a3b8">, </tspan><tspan fill="#86efac">"supabase"</tspan><tspan fill="#e0e7ff">]</tspan><tspan fill="#94a3b8">,</tspan></text>

    <text x="64" y="170"><tspan fill="#93c5fd">mission</tspan><tspan fill="#94a3b8">: </tspan><tspan fill="#86efac">"write code a student could read"</tspan><tspan fill="#94a3b8">,</tspan></text>

    <text x="40" y="200"><tspan fill="#e0e7ff">}</tspan><tspan fill="#94a3b8">;</tspan></text>

    <rect x="64" y="187" width="9" height="16" fill="#a5b4fc">
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.5;0.5;1;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
